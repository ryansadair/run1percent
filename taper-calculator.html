<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<body>

<!-- NAV (RESTORED) -->
<nav class="r1-nav">
  <a class="r1-nav-logo" href="index.html">
    <img src="logo-white.png" alt="RUN1%">
  </a>
  <ul class="r1-nav-links">
    <li><a href="index.html#tools">Tools</a></li>

    <li><a href="index.html#about">About</a></li>
  </ul>
  <a class="r1-back" href="index.html">Back</a>
</nav>

<div class="r1-spacer"></div>

<!-- HERO -->
<section class="hero">
  <div class="hero-label">Tool No. 04</div>
  <h1>Taper<br>Calculator</h1>
  <p class="hero-sub">
    Enter your peak mileage and race date. Get a science-backed taper schedule.
  </p>
</section>

<div class="main">

<!-- LEFT -->
<div class="panel-left">

  <div class="section-label">Your Race Info</div>

  <!-- DISTANCE -->
  <div class="field">
    <label>Race Distance</label>
    <select id="raceDistance" onchange="handleDistanceChange()">
      <option value="half">Half Marathon (13.1 mi)</option>
      <option value="marathon">Marathon (26.2 mi)</option>
      <option value="custom">Custom Distance</option>
    </select>

    <!-- CUSTOM BOX (NEW — MATCHES PACER APP) -->
    <div id="customDistanceBox" style="display:none; margin-top:10px;">
      <label>Custom Distance (miles)</label>
      <input type="number" id="customDistance" placeholder="e.g. 18">
    </div>
  </div>

  <!-- PEAK -->
  <div class="field">
    <label>Peak Weekly Mileage</label>
    <input type="number" id="peakMiles" placeholder="e.g. 45">
  </div>

  <button class="btn-calculate" onclick="calculate()">Calculate Taper →</button>

</div>

<!-- RIGHT -->
<div class="panel-right">
  <div id="resultsEmpty"></div>
  <div id="resultsContent"></div>
</div>

</div>

<!-- FOOTER (RESTORED) -->
<footer>
  <img src="logo-white.png" alt="RUN1%">
  <ul class="footer-links">
    <li><a href="index.html#tools">Tools</a></li>
    <li><a href="index.html#notes">Field Notes</a></li>
    <li><a href="index.html#about">About</a></li>
  </ul>
  <div class="footer-copy">© 2026 RUN1PERCENT.COM · EUGENE, OR</div>
</footer>

<!-- SCRIPT -->
<script>

function handleDistanceChange(){
  const val = document.getElementById('raceDistance').value;
  document.getElementById('customDistanceBox').style.display =
    val === 'custom' ? 'block' : 'none';
}

function getDistance(){
  const v = document.getElementById('raceDistance').value;

  if(v === 'custom'){
    return parseFloat(document.getElementById('customDistance').value || 0);
  }
  if(v === 'half') return 13.1;
  if(v === 'marathon') return 26.2;

  return 13.1;
}

function calculate(){

  const peak = parseFloat(document.getElementById('peakMiles').value || 0);
  const distance = getDistance();

  if(!peak || !distance){
    alert("Enter valid inputs");
    return;
  }

  const taperWeeks =
    distance <= 13.1 ? 2 :
    distance <= 26.2 ? 3 : 4;

  const container = document.getElementById('resultsContent');

  container.innerHTML = `
    <div class="race-info-bar">
      <div><strong>Distance:</strong> ${distance} mi</div>
      <div><strong>Peak:</strong> ${peak} mi</div>
      <div><strong>Taper:</strong> ${taperWeeks} weeks</div>
    </div>
  `;

  for(let i=0;i<taperWeeks;i++){

    const pct = 1 - (i+1) * 0.2;
    const miles = peak * Math.max(pct, 0.3);

    container.innerHTML += `
      <div class="week-row">
        <div>Week ${i+1}</div>
        <div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${Math.max(pct*100,30)}%"></div>
          </div>
        </div>
        <div>${miles.toFixed(0)} mi</div>
      </div>
    `;
  }

  container.innerHTML += `
    <div class="tips-section">
      <div class="weeks-label">Race Week Field Notes</div>
      ${getTips(distance).map(t =>
        `<div class="tip-item"><strong>${t.h}</strong> ${t.t}</div>`
      ).join('')}
    </div>
  `;
}

function getTips(distance){

  if(distance <= 13.1){
    return [
      {h:"Mon–Tue:",t:"Easy 3–4 miles."},
      {h:"Wed:",t:"Light strides."},
      {h:"Thu:",t:"Rest or shakeout."},
      {h:"Race:",t:"Controlled start."}
    ];
  }

  if(distance <= 26.2){
    return [
      {h:"Week:",t:"Reduce volume, keep rhythm."},
      {h:"Midweek:",t:"Short sharp tune-up."},
      {h:"Pre-race:",t:"Rest + fuel."},
      {h:"Race:",t:"Patience early."}
    ];
  }

  return [
    {h:"Taper:",t:"Aggressive cut, maintain frequency."},
    {h:"Fuel:",t:"Prioritize glycogen storage."},
    {h:"Mindset:",t:"Resist overtraining anxiety."},
    {h:"Race:",t:"Start slower than you think."}
  ];
}

</script>

</body>
</html>
