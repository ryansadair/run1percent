<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taper Calculator — Run1%</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --black:#0a0a0a;
  --deep:#111;
  --surface:#181818;
  --border:#2a2a2a;
  --text:#e8e8e8;
  --text-dim:#666;
  --text-mid:#999;
  --white:#f5f5f5;
  --red:#e5281a;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:var(--black);
  color:var(--text);
  font-family:'DM Mono',monospace;
  font-size:13px;
}

.hero{padding:60px 40px;border-bottom:1px solid var(--border);}
h1{font-family:'Bebas Neue';font-size:72px;color:var(--white);line-height:1;}

.main{display:grid;grid-template-columns:1fr 1fr;min-height:100vh;}

.panel-left{padding:40px;border-right:1px solid var(--border);}
.panel-right{padding:40px;background:var(--deep);}

.section-label{
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:.2em;
  color:var(--text-dim);
  margin-bottom:18px;
  border-bottom:1px solid var(--border);
  padding-bottom:8px;
}

.field{margin-bottom:24px;}

label{
  display:block;
  font-size:10px;
  color:var(--text-dim);
  margin-bottom:6px;
  text-transform:uppercase;
  letter-spacing:.15em;
}

input,select{
  width:100%;
  padding:10px 12px;
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
  font-family:inherit;
  outline:none;
}

select{cursor:pointer;}

.btn{
  width:100%;
  padding:14px;
  background:var(--red);
  color:#fff;
  border:none;
  font-family:'Bebas Neue';
  font-size:20px;
  cursor:pointer;
}

/* custom distance box */
#customDistanceBox{
  display:none;
  margin-top:10px;
}

.race-info{
  background:var(--surface);
  padding:14px;
  border:1px solid var(--border);
  margin-bottom:20px;
}

.week{
  display:grid;
  grid-template-columns:80px 1fr 80px;
  padding:12px 0;
  border-bottom:1px solid #222;
}

.week:last-child{border-bottom:none;}

.bar{
  height:6px;
  background:#222;
  position:relative;
}

.bar > div{
  height:100%;
  background:var(--red);
}

.tip{
  padding:10px 0;
  border-bottom:1px solid #222;
  font-size:11px;
  color:var(--text-mid);
}
</style>
</head>

<body>

<section class="hero">
  <h1>Taper<br>Calculator</h1>
</section>

<div class="main">

<!-- LEFT -->
<div class="panel-left">

<div class="section-label">Race Setup</div>

<div class="field">
<label>Race Distance</label>
<select id="raceDistance" onchange="handleDistanceChange()">
  <option value="half">Half Marathon (13.1)</option>
  <option value="marathon">Marathon (26.2)</option>
  <option value="custom">Custom</option>
</select>

<div id="customDistanceBox">
  <label>Custom Distance (miles)</label>
  <input type="number" id="customDistance" placeholder="e.g. 18">
</div>
</div>

<div class="field">
<label>Peak Weekly Mileage</label>
<input type="number" id="peakMiles" placeholder="e.g. 45">
</div>

<button class="btn" onclick="calculate()">Generate Taper</button>

</div>

<!-- RIGHT -->
<div class="panel-right">

<div id="results"></div>

</div>

</div>

<script>

function handleDistanceChange(){
  const val = document.getElementById('raceDistance').value;
  document.getElementById('customDistanceBox').style.display =
    val === 'custom' ? 'block' : 'none';
}

function getDistance(){
  const type = document.getElementById('raceDistance').value;
  if(type === 'custom'){
    return parseFloat(document.getElementById('customDistance').value || 0);
  }
  if(type === 'half') return 13.1;
  if(type === 'marathon') return 26.2;
  return 13.1;
}

function getTaper(distance){
  if(distance <= 13.1) return 2;
  if(distance <= 26.2) return 3;
  return 4;
}

function calculate(){

  const peak = parseFloat(document.getElementById('peakMiles').value || 0);
  const distance = getDistance();
  const weeks = getTaper(distance);

  const container = document.getElementById('results');
  container.innerHTML = '';

  // header
  container.innerHTML += `
    <div class="race-info">
      <div><strong>Distance:</strong> ${distance} mi</div>
      <div><strong>Peak:</strong> ${peak} mi/week</div>
      <div><strong>Taper Length:</strong> ${weeks} weeks</div>
    </div>
  `;

  // taper curve
  for(let i=weeks;i>=0;i--){

    const pct = i === 0 ? 0.2 : (1 - (weeks - i + 1) * (0.25));
    const miles = peak * Math.max(pct, 0.2);

    container.innerHTML += `
      <div class="week">
        <div>Week ${weeks - i + 1}</div>
        <div>
          <div class="bar"><div style="width:${Math.max(pct*100,20)}%"></div></div>
        </div>
        <div>${miles.toFixed(0)} mi</div>
      </div>
    `;
  }

  // race week notes (now properly tied to distance)
  const tips = getTips(distance);

  container.innerHTML += `<div style="margin-top:20px"></div>`;

  tips.forEach(t=>{
    container.innerHTML += `
      <div class="tip"><strong>${t.h}</strong> ${t.t}</div>
    `;
  });
}

function getTips(distance){

  if(distance <= 13.1){
    return [
      {h:"Mon–Tue:",t:"Easy 3–4 mile shakeouts."},
      {h:"Wed:",t:"Strides + light activation."},
      {h:"Thu:",t:"Rest or 2 miles easy."},
      {h:"Fri:",t:"Full rest."},
      {h:"Race:",t:"Controlled start, build late."}
    ];
  }

  if(distance <= 26.2){
    return [
      {h:"Mon–Wed:",t:"Easy running only."},
      {h:"Thu:",t:"Short tune-up w/ strides."},
      {h:"Fri:",t:"Rest + carb load."},
      {h:"Sat:",t:"Shakeout only."},
      {h:"Race:",t:"Run disciplined first half."}
    ];
  }

  return [
    {h:"Week:",t:"Reduce volume aggressively but keep frequency."},
    {h:"Midweek:",t:"Short intensity to stay sharp."},
    {h:"Pre-race:",t:"Rest, fuel, sleep heavily."},
    {h:"Race:",t:"Start conservative. Survive early miles."}
  ];
}

</script>

</body>
</html>
