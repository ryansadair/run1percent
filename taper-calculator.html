<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taper Calculator — Run1%</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --black:#0a0a0a;
  --deep:#111;
  --surface:#181818;
  --border:#2a2a2a;
  --text:#e8e8e8;
  --text-dim:#666;
  --red:#e5281a;
  --white:#f5f5f5;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:var(--black);
  color:var(--text);
  font-family:'DM Mono', monospace;
  font-size:13px;
}

/* NAV */
.r1-nav{
  position:fixed;top:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:18px 40px;
  background:rgba(10,10,10,0.95);
  border-bottom:1px solid var(--border);
  z-index:100;
}
.r1-nav img{height:32px;}
.r1-nav a{color:var(--text-dim);text-decoration:none;font-size:10px;text-transform:uppercase;letter-spacing:.2em;}
.r1-nav a:hover{color:var(--text);}
.r1-spacer{height:70px;}

/* HERO */
.hero{
  padding:60px 40px;
  border-bottom:1px solid var(--border);
}
h1{
  font-family:'Bebas Neue';
  font-size:72px;
  color:var(--white);
  line-height:1;
}

/* LAYOUT */
.main{
  display:grid;
  grid-template-columns:1fr 1fr;
  min-height:100vh;
}

.left{
  padding:40px;
  border-right:1px solid var(--border);
}

.right{
  padding:40px;
  background:var(--deep);
}

.section{
  font-size:10px;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--text-dim);
  border-bottom:1px solid var(--border);
  padding-bottom:10px;
  margin-bottom:20px;
}

.field{margin-bottom:20px;}

label{
  font-size:10px;
  color:var(--text-dim);
  text-transform:uppercase;
  letter-spacing:.15em;
  display:block;
  margin-bottom:6px;
}

input,select{
  width:100%;
  padding:10px;
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  background:var(--red);
  border:none;
  color:white;
  font-family:'Bebas Neue';
  font-size:20px;
  cursor:pointer;
}

/* RESULTS */
.card{
  background:var(--surface);
  padding:12px;
  border:1px solid var(--border);
  margin-bottom:10px;
}

.bar{
  height:6px;
  background:#222;
  margin:6px 0;
}
.bar > div{
  height:100%;
  background:var(--red);
}

/* CUSTOM BOX */
#customBox{
  display:none;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="r1-nav">
  <img src="logo-white.png" alt="RUN1%">
  <a href="index.html">Back</a>
</nav>

<div class="r1-spacer"></div>

<!-- HERO -->
<section class="hero">
  <h1>Taper<br>Calculator</h1>
</section>

<div class="main">

<!-- LEFT -->
<div class="left">

<div class="section">Race Setup</div>

<div class="field">
<label>Race Distance</label>
<select id="raceDistance" onchange="toggleCustom()">
  <option value="half">Half Marathon (13.1)</option>
  <option value="marathon">Marathon (26.2)</option>
  <option value="custom">Custom</option>
</select>

<div id="customBox">
  <label>Custom Distance (mi)</label>
  <input id="customDistance" type="number" placeholder="e.g. 18">
</div>
</div>

<div class="field">
<label>Peak Mileage</label>
<input id="peak" type="number" placeholder="e.g. 45">
</div>

<button onclick="calc()">Generate Taper</button>

</div>

<!-- RIGHT -->
<div class="right">
<div id="out"></div>
</div>

</div>

<script>

function toggleCustom(){
  const v = document.getElementById('raceDistance').value;
  document.getElementById('customBox').style.display =
    v === 'custom' ? 'block' : 'none';
}

function getDistance(){
  const v = document.getElementById('raceDistance').value;

  if(v === 'custom'){
    return parseFloat(document.getElementById('customDistance').value || 0);
  }
  if(v === 'half') return 13.1;
  if(v === 'marathon') return 26.2;
}

function calc(){

  const peak = parseFloat(document.getElementById('peak').value || 0);
  const dist = getDistance();

  const weeks =
    dist <= 13.1 ? 2 :
    dist <= 26.2 ? 3 : 4;

  const out = document.getElementById('out');
  out.innerHTML = '';

  out.innerHTML += `
    <div class="card">
      <strong>Distance:</strong> ${dist} mi<br>
      <strong>Peak:</strong> ${peak} mi<br>
      <strong>Taper:</strong> ${weeks} weeks
    </div>
  `;

  for(let i=0;i<weeks;i++){

    const pct = 1 - (i+1)*0.22;
    const miles = peak * Math.max(pct,0.25);

    out.innerHTML += `
      <div class="card">
        Week ${i+1}
        <div class="bar"><div style="width:${pct*100}%"></div></div>
        ${miles.toFixed(1)} mi
      </div>
    `;
  }

  out.innerHTML += `
    <div class="card">
      <strong>Race Week Field Notes</strong><br><br>
      ${getTips(dist)}
    </div>
  `;
}

function getTips(d){

  if(d <= 13.1){
    return "Short easy runs, strides midweek, rest before race.";
  }
  if(d <= 26.2){
    return "Reduce volume, maintain sharpness, prioritize sleep.";
  }
  return "Aggressive taper, maintain frequency, avoid fatigue spikes.";
}

</script>

</body>
</html>
