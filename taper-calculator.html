<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taper Calculator — Run1%</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">

<style>
/* KEEPING YOUR ORIGINAL STYLES UNCHANGED FOR BREVITY */
/* (all your CSS remains exactly the same) */
</style>

</head>

<body>

<!-- NAV (unchanged) -->
<nav class="r1-nav">
  <a class="r1-nav-logo" href="index.html">
    <img src="logo-white.png" alt="RUN1%">
  </a>

  <ul class="r1-nav-links">
    <li><a href="index.html#tools">Tools</a></li>
    <li><a href="index.html#notes">Field Notes</a></li>
    <li><a href="index.html#about">About</a></li>
  </ul>

  <a class="r1-back" href="index.html">Back</a>
</nav>

<div class="r1-spacer"></div>

<section class="hero">
  <div class="hero-label">Tool No. 04</div>
  <h1>Taper<br>Calculator</h1>
  <p class="hero-sub">
    Enter your peak mileage and race date. Get a science-backed taper schedule.
  </p>
</section>

<div class="main">

<!-- LEFT -->
<div class="panel-left">

  <div class="section-label">Your Race Info</div>

  <div class="field">
    <label>Race Distance</label>
    <select id="raceDistance">
      <option value="half">Half Marathon (13.1 mi)</option>
      <option value="marathon">Marathon (26.2 mi)</option>
      <option value="custom">Custom Distance</option>
    </select>
  </div>

  <!-- ✅ CUSTOM DISTANCE (NEW) -->
  <div class="field" id="customDistanceField" style="display:none;">
    <label>Custom Distance (miles)</label>
    <input type="number" id="customDistance" placeholder="e.g. 18" step="0.1" min="1">
  </div>

  <div class="field">
    <label>Race Date</label>
    <input type="date" id="raceDate">
  </div>

  <div class="field">
    <label>Peak Weekly Mileage</label>
    <input type="number" id="peakMiles" placeholder="e.g. 42">
  </div>

  <div class="field">
    <label>Taper Style</label>
    <select id="taperStyle">
      <option value="standard">Standard</option>
      <option value="aggressive">Aggressive</option>
      <option value="conservative">Conservative</option>
    </select>
  </div>

  <div class="field">
    <label>Experience Level</label>
    <select id="level">
      <option value="intermediate">Intermediate</option>
      <option value="advanced">Advanced</option>
    </select>
  </div>

  <button class="btn-calculate" onclick="calculate()">Calculate Taper</button>

</div>

<!-- RIGHT -->
<div class="panel-right">

  <div id="resultsEmpty">
    <p>Enter race info to generate taper plan</p>
  </div>

  <div id="resultsContent" style="display:none;">

    <div class="race-info-bar" id="raceInfoBar"></div>

    <div class="weeks-label">Weekly Mileage Schedule</div>
    <div id="weeksContainer"></div>

    <div class="weeks-label">Race Week Field Notes</div>
    <div id="tipsContainer"></div>

  </div>

</div>

</div>

<script>

let unit = 'miles';

/* =========================
   CUSTOM DISTANCE TOGGLE
========================= */
document.getElementById('raceDistance').addEventListener('change', function () {
  document.getElementById('customDistanceField').style.display =
    this.value === 'custom' ? 'block' : 'none';
});

/* =========================
   TAPERS
========================= */

function getTaperWeeks(distance, style) {
  const base = {
    half: { standard: 2, aggressive: 2, conservative: 3 },
    marathon: { standard: 3, aggressive: 2, conservative: 4 }
  };
  return base[distance][style];
}

function getTaperMultipliers(weeks, style, level) {
  const adv = level === 'advanced';

  if (weeks === 2) {
    return style === 'aggressive'
      ? [adv ? 0.6 : 0.55, adv ? 0.35 : 0.3]
      : style === 'conservative'
        ? [adv ? 0.75 : 0.7, adv ? 0.5 : 0.45]
        : [adv ? 0.7 : 0.65, adv ? 0.4 : 0.35];
  }

  if (weeks === 3) {
    return style === 'aggressive'
      ? [0.65, 0.45, 0.3]
      : style === 'conservative'
        ? [0.8, 0.6, 0.4]
        : [0.75, 0.5, 0.3];
  }

  return [0.7, 0.4];
}

/* =========================
   MAIN CALCULATION
========================= */

function calculate() {

  const peakMiles = parseFloat(document.getElementById('peakMiles').value);
  const style = document.getElementById('taperStyle').value;
  const level = document.getElementById('level').value;

  let distance = document.getElementById('raceDistance').value;

  // ✅ CUSTOM DISTANCE FIX
  if (distance === 'custom') {
    const custom = parseFloat(document.getElementById('customDistance').value);
    if (!custom || custom <= 0) {
      alert('Enter valid custom distance');
      return;
    }
    distance = custom;
  }

  const raceDate = new Date(document.getElementById('raceDate').value);
  const today = new Date();

  const taperWeeks =
    typeof distance === 'number'
      ? 3
      : getTaperWeeks(distance, style);

  const multipliers =
    typeof distance === 'number'
      ? getTaperMultipliers(3, style, level)
      : getTaperMultipliers(taperWeeks, style, level);

  /* =========================
     DISPLAY NAME FIX
  ========================= */

  const names = {
    half: 'Half Marathon',
    marathon: 'Marathon'
  };

  const displayDistance =
    typeof distance === 'number'
      ? `${distance.toFixed(1)} mi`
      : names[distance];

  document.getElementById('raceInfoBar').innerHTML = `
    <div>${displayDistance}</div>
    <div>${peakMiles} mi peak</div>
    <div>${taperWeeks} week taper</div>
  `;

  /* =========================
     WEEK BUILD
  ========================= */

  const container = document.getElementById('weeksContainer');
  container.innerHTML = '';

  multipliers.forEach((m, i) => {
    const div = document.createElement('div');
    div.className = 'week-row';

    div.innerHTML = `
      <div>Week ${i + 1}</div>
      <div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${m * 100}%"></div>
        </div>
      </div>
      <div>${Math.round(peakMiles * m)} mi</div>
    `;

    container.appendChild(div);
  });

  /* =========================
     RACE WEEK NOTES (FIXED)
  ========================= */

  const tips = [
    { strong: "Mon–Tue:", text: "Easy 30–40 min runs. No intensity." },
    { strong: "Wed:", text: "Short strides + relaxed running. Optional 2×1 mi at race pace." },
    { strong: "Thu:", text: "Easy or rest. Let fatigue fully drop." },
    { strong: "Fri:", text: "Rest + prep gear." },
    { strong: "Race Day:", text: "Controlled start. Commit after midpoint." }
  ];

  const tipContainer = document.getElementById('tipsContainer');
  tipContainer.innerHTML = '';

  tips.forEach(t => {
    const el = document.createElement('div');
    el.innerHTML = `<strong>${t.strong}</strong> ${t.text}`;
    tipContainer.appendChild(el);
  });

  document.getElementById('resultsEmpty').style.display = 'none';
  document.getElementById('resultsContent').style.display = 'block';
}

</script>

</body>
</html>
