<script>
function updateResults() {
  const tgtMin = parseInt(document.getElementById('tgt-min').value) || 9;
  const tgtSec = parseInt(document.getElementById('tgt-sec').value) || 0;

  const targetSecs = paceToSecs(tgtMin, tgtSec);

  // Actual logged total
  const totalLoggedSecs = miles.reduce(
    (sum, m) => sum + paceToSecs(m.min, m.sec),
    0
  );

  // Current average pace
  const avgSecs =
    miles.length > 0 ? totalLoggedSecs / miles.length : targetSecs;

  document.getElementById('avgPaceDisplay').textContent =
    secsToPace(avgSecs) + " /mi";

  const container = document.getElementById('results-rows');
  container.innerHTML = '';

  const totalMiles = Math.ceil(goalDistance);

  for (let mile = 1; mile <= totalMiles; mile++) {

    const row = document.createElement('div');
    row.className = 'dist-row';

    // Already completed miles
    if (mile <= miles.length) {

      row.innerHTML = `
        <div>Mile ${mile}</div>
        <div style="color:var(--text-dim);">—</div>
      `;

    } else {

      // Remaining miles INCLUDING this one
      const remainingMiles = totalMiles - mile + 1;

      // Total allowed seconds for full goal
      const goalTotalSecs = targetSecs * goalDistance;

      // Seconds still available
      const remainingSecsAllowed = goalTotalSecs - totalLoggedSecs;

      // Required average pace for remaining miles
      const requiredPace = remainingSecsAllowed / remainingMiles;

      row.innerHTML = `
        <div>Mile ${mile}</div>
        <div style="
          font-family:Bebas Neue,sans-serif;
          font-size:20px;
          color:${requiredPace < targetSecs ? 'var(--green)' : 'var(--text)'}
        ">
          ${secsToPace(requiredPace)} /mi
        </div>
      `;
    }

    container.appendChild(row);
  }
}
</script>
